name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx flake8

      - name: Lint with flake8
        run: |
          # Stop build if syntax errors or undefined names
          flake8 app/ utils/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only — don't fail on style issues
          flake8 app/ utils/ --count --max-line-length=100 --statistics --exit-zero

      - name: Run unit tests
        env:
          AGENT_API_KEY: test-key-123
          ENVIRONMENT: test
          RATE_LIMIT_PER_MINUTE: "100"
        run: |
          pytest tests/ -v --tb=short
